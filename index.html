<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio Normativo de Entidades - Bolivia</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para los íconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- SheetJS para parsear el CSV exportado de Google Sheets y exportar Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        /* Animación para el modal */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-anim {
            animation: fadeIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col relative">

    <!-- Header -->
    <header class="bg-red-800 text-white shadow-md z-10">
        <div class="container mx-auto px-4 py-6">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="flex items-center mb-4 md:mb-0">
                    <i class="fas fa-book-scale text-3xl mr-3 text-yellow-400"></i>
                    <div>
                        <h1 class="text-2xl font-bold">Normativas y Atribuciones</h1>
                        <p class="text-sm text-red-200">Entidades del Estado Plurinacional de Bolivia</p>
                    </div>
                </div>
                <!-- Search Bar -->
                <div class="w-full md:w-1/3 relative">
                    <input type="text" id="searchInput" placeholder="Buscar por sigla, nombre, ley o atribución..." 
                           class="w-full pl-10 pr-4 py-2.5 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-yellow-400 shadow-inner transition-all">
                    <i class="fas fa-search absolute left-3 top-3.5 text-gray-400"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8 flex-grow">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <h2 class="text-xl font-semibold text-gray-700 mb-4 md:mb-0 flex items-center">
                Listado de Entidades 
                <span id="countBadge" class="bg-red-100 text-red-800 py-1 px-3 rounded-full text-sm ml-3 font-bold">0</span>
            </h2>
            
            <div class="flex flex-wrap justify-center items-center gap-3">
                
                <!-- Botón de Sincronización Directa de Google Sheets -->
                <button id="syncBtn" onclick="syncWithGoogleSheets()" class="flex items-center text-green-700 hover:text-green-800 hover:bg-green-100 font-medium transition-colors text-sm bg-green-50 border border-green-200 px-4 py-2 rounded-lg shadow-sm" title="Actualizar datos desde Google Sheets en un clic">
                    <i class="fab fa-google-drive mr-2" id="syncSpinner"></i> <span id="syncBtnText">Sync G. Sheets</span>
                </button>
                
                <button onclick="exportToExcel()" class="flex items-center text-blue-700 hover:text-blue-800 hover:bg-blue-100 font-medium transition-colors text-sm bg-blue-50 border border-blue-200 px-4 py-2 rounded-lg shadow-sm" title="Descargar base de datos a Excel">
                    <i class="fas fa-file-export mr-2"></i> Exportar Plantilla
                </button>

                <div class="border-l border-gray-300 h-6 mx-1 hidden md:block"></div>

                <button onclick="sortEntities()" class="flex items-center text-gray-700 hover:text-gray-900 hover:bg-gray-200 font-medium transition-colors text-sm bg-gray-100 border border-gray-200 px-4 py-2 rounded-lg shadow-sm">
                    <i class="fas fa-sort-alpha-down mr-2" id="sortIcon"></i> Ordenar A-Z
                </button>
            </div>
        </div>

        <!-- Grid Container -->
        <div id="entitiesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Las tarjetas se insertarán aquí dinámicamente con JS -->
        </div>

        <!-- No Results Message -->
        <div id="noResults" class="hidden text-center py-16">
            <i class="fas fa-search-minus text-5xl text-gray-300 mb-4"></i>
            <h3 class="text-xl font-bold text-gray-600">No se encontraron entidades</h3>
            <p class="text-gray-500 mt-2">Intenta modificar los términos de búsqueda.</p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-6 mt-auto">
        <div class="container mx-auto px-4 text-center text-sm text-gray-400">
            <p><i class="fas fa-cloud-sync mr-1"></i> Base de datos sincronizada en la nube con Google Sheets.</p>
        </div>
    </footer>

    <!-- El modal de Google Sheets fue eliminado, la sincronización ahora es directa -->

    <!-- JavaScript Base de Datos y Lógica -->
    <script>
        // === CONFIGURACIÓN DE GOOGLE SHEETS ===
        // REEMPLAZA EL VALOR DE ABAJO CON EL ID DE TU HOJA DE GOOGLE SHEETS
        // Lo encuentras en la URL de tu hoja: https://docs.google.com/spreadsheets/d/[ESTE_ES_EL_ID]/edit
        const GOOGLE_SHEETS_ID = '1r3HrxMnLDtv6qH_nT9sMOdDb5sT7yF0p0d-lsDWLvGo';

        // Base de datos por defecto (para cuando no hay Sheets sincronizado)
        const defaultDbEntidades = [
            // Ministerio de Gobierno
            { sigla: "COVIPOL", nombre: "Consejo Nacional de Vivienda Policial", tipo: "Descentralizada", ministerio: "Ministerio de Gobierno", creacion: "Ley Orgánica de la Policía (Ley N° 734 de 08/04/1985)", normativa_adicional: "D.S. N° 3106, D.S. N° 2899, D.S. N° 1446", atribuciones: "Planificación y ejecución de proyectos de vivienda para la Policía.", descripcion: "Entidad encargada de dotar y gestionar planes de vivienda en beneficio de la familia policial." },
            { sigla: "DIGEMIG", nombre: "Dirección General de Migración", tipo: "Desconcentrada", ministerio: "Ministerio de Gobierno", creacion: "Ley N° 370 de Migración (08/05/2013)", normativa_adicional: "D.S. N° 1923 (Reglamento a la Ley 370), Ley N° 264", atribuciones: "Control y registro de flujo migratorio, emisión de arraigos y pasaportes.", descripcion: "Regula el ingreso, tránsito y salida de personas del territorio nacional." },
            { sigla: "AGETIC", nombre: "Agencia de Gobierno Electrónico y Tecnologías de Información", tipo: "Descentralizada", ministerio: "Ministerio de la Presidencia", creacion: "Decreto Supremo N° 2514 (09/09/2015)", normativa_adicional: "Ley N° 1080 (Ciudadanía Digital), D.S. N° 3525", atribuciones: "Implementación de gobierno electrónico, simplificación de trámites.", descripcion: "Desarrolla tecnología para modernizar el Estado y acercarlo a los ciudadanos." }
            // Se omiten algunas entidades base por brevedad visual, al sincronizar se poblarán todas.
        ];

        // Variables globales
        let dbEntidades = JSON.parse(localStorage.getItem('entidades_bolivia_db_v5')) || defaultDbEntidades;
        let entidadesActuales = [...dbEntidades];
        let ascendente = true;

        const grid = document.getElementById('entitiesGrid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const countBadge = document.getElementById('countBadge');

        // Función para renderizar las tarjetas
        function renderEntities(entidades) {
            grid.innerHTML = '';
            countBadge.textContent = entidades.length;

            if (entidades.length === 0) {
                noResults.classList.remove('hidden');
                return;
            } else {
                noResults.classList.add('hidden');
            }

            entidades.forEach(ent => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow-md overflow-hidden card-hover border border-gray-100 flex flex-col';
                
                // Color según tipo
                const tipoColor = (ent.tipo && ent.tipo.toLowerCase() === 'descentralizada') ? 'bg-blue-600' : 'bg-green-600';

                card.innerHTML = `
                    <div class="bg-gradient-to-r from-red-800 to-red-700 px-4 py-3 flex justify-between items-center text-white">
                        <h3 class="font-bold text-lg tracking-wide" title="${ent.nombre || 'Sin Nombre'}">${ent.sigla || 'N/A'}</h3>
                        <span class="text-[10px] uppercase font-bold px-2 py-1 rounded shadow-inner ${tipoColor}">${ent.tipo || 'Entidad'}</span>
                    </div>
                    <div class="p-5 flex-grow flex flex-col bg-gray-50">
                        <h4 class="text-gray-800 font-bold mb-1 leading-tight text-sm">${ent.nombre || 'Sin descripción'}</h4>
                        <p class="text-xs text-red-600 font-bold mb-4"><i class="fas fa-building mr-1"></i> ${ent.ministerio || 'Sin Ministerio'}</p>
                        
                        <div class="mb-3 bg-white p-3 rounded-lg border border-gray-200 shadow-sm">
                            <span class="text-[10px] uppercase font-bold text-red-600 tracking-wider block mb-1">Norma de Creación</span>
                            <p class="text-xs text-gray-800 font-medium"><i class="fas fa-file-signature text-red-400 mr-1.5"></i> ${ent.creacion || 'No especificada'}</p>
                        </div>

                        ${ent.normativa_adicional ? `
                        <div class="mb-3 bg-white p-3 rounded-lg border border-gray-200 shadow-sm">
                            <span class="text-[10px] uppercase font-bold text-blue-600 tracking-wider block mb-1">Otras Normas</span>
                            <p class="text-xs text-gray-800 font-medium"><i class="fas fa-scroll text-blue-400 mr-1.5"></i> ${ent.normativa_adicional}</p>
                        </div>` : ''}
                        
                        <div class="mb-4 bg-white p-3 rounded-lg border border-gray-200 shadow-sm">
                            <span class="text-[10px] uppercase font-bold text-yellow-600 tracking-wider block mb-1">Atribuciones</span>
                            <p class="text-xs text-gray-800 font-medium"><i class="fas fa-gavel text-yellow-500 mr-1.5"></i> ${ent.atribuciones || 'No especificadas'}</p>
                        </div>
                        
                        <div class="mt-auto pt-3 border-t border-gray-200">
                            <p class="text-xs text-gray-500 italic text-center px-2">"${ent.descripcion || ''}"</p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Búsqueda
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            entidadesActuales = dbEntidades.filter(ent => 
                Object.values(ent).some(val => 
                    String(val).toLowerCase().includes(query)
                )
            );
            renderEntities(entidadesActuales);
        });

        // Ordenamiento
        function sortEntities() {
            entidadesActuales.sort((a, b) => {
                const siglaA = (a.sigla || '').toLowerCase();
                const siglaB = (b.sigla || '').toLowerCase();
                if (siglaA < siglaB) return ascendente ? -1 : 1;
                if (siglaA > siglaB) return ascendente ? 1 : -1;
                return 0;
            });
            ascendente = !ascendente;
            const sortIcon = document.getElementById('sortIcon');
            if (sortIcon) sortIcon.className = ascendente ? 'fas fa-sort-alpha-down mr-2' : 'fas fa-sort-alpha-up mr-2';
            renderEntities(entidadesActuales);
        }

        // --- SINCRONIZACIÓN DIRECTA CON GOOGLE SHEETS ---

        async function syncWithGoogleSheets() {
            const syncBtn = document.getElementById('syncBtn');
            const syncSpinner = document.getElementById('syncSpinner');
            const syncBtnText = document.getElementById('syncBtnText');

            if (GOOGLE_SHEETS_ID === 'TU_ID_DE_GOOGLE_SHEETS_AQUI' || !GOOGLE_SHEETS_ID) {
                alert("⚠️ Acción requerida: Por favor, abre el código de la aplicación y pon el ID de tu Google Sheets en la constante 'GOOGLE_SHEETS_ID' (Línea debajo de <script>).");
                return;
            }

            // Construimos la URL secreta de la API de Visualización de Google para extraer CSV crudo
            const csvUrl = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEETS_ID}/gviz/tq?tqx=out:csv`;

            try {
                // UI: Estado de carga
                syncBtn.disabled = true;
                syncSpinner.classList.remove('fab', 'fa-google-drive');
                syncSpinner.classList.add('fas', 'fa-sync-alt', 'fa-spin');
                syncBtnText.textContent = "Sincronizando...";

                const response = await fetch(csvUrl);
                
                if (!response.ok) {
                    throw new Error("No se pudo conectar. Verifica que el ID sea correcto y el archivo esté público ('Cualquier persona con el enlace').");
                }

                const csvText = await response.text();

                // Si la hoja es privada, Google devuelve una página HTML de inicio de sesión
                if (csvText.trim().toLowerCase().startsWith('<!doctype html>')) {
                    throw new Error("La hoja es privada. Cambia el acceso a 'Cualquier persona con el enlace'.");
                }

                // Usamos SheetJS para transformar el CSV extraído en formato JSON
                const workbook = XLSX.read(csvText, {type: 'string'});
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(worksheet);

                // Validamos que haya datos estructurados correctamente
                if (json.length > 0 && ('sigla' in json[0]) && ('nombre' in json[0])) {
                    
                    dbEntidades = json;
                    entidadesActuales = [...dbEntidades];
                    
                    // Guardamos la base de datos (version 5 para forzar refresco)
                    localStorage.setItem('entidades_bolivia_db_v5', JSON.stringify(dbEntidades));
                    
                    searchInput.value = '';
                    renderEntities(entidadesActuales);
                    
                    setTimeout(() => {
                        alert(`¡Sincronización Exitosa! Se actualizaron ${json.length} entidades directamente desde tu Google Sheets.`);
                    }, 100);

                } else {
                    throw new Error('La estructura no coincide. Tu hoja debe tener encabezados como "sigla", "nombre", etc.');
                }

            } catch (error) {
                alert("Error de sincronización:\n" + error.message);
            } finally {
                // UI: Restaurar estado del botón
                syncBtn.disabled = false;
                syncSpinner.classList.remove('fas', 'fa-sync-alt', 'fa-spin');
                syncSpinner.classList.add('fab', 'fa-google-drive');
                syncBtnText.textContent = "Sync G. Sheets";
            }
        }

        // --- EXCEL (Respaldos) ---
        function exportToExcel() {
            const worksheet = XLSX.utils.json_to_sheet(dbEntidades);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Plantilla_Entidades");
            XLSX.writeFile(workbook, "Plantilla_Google_Sheets_Entidades.xlsx");
        }

        // Inicialización
        sortEntities(); 

    </script>
</body>
</html>
