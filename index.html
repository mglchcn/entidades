<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio Normativo de Entidades - Bolivia</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para los íconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- SheetJS para exportar/importar Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-red-800 text-white shadow-md">
        <div class="container mx-auto px-4 py-6">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="flex items-center mb-4 md:mb-0">
                    <i class="fas fa-book-scale text-3xl mr-3 text-yellow-400"></i>
                    <div>
                        <h1 class="text-2xl font-bold">Normativas y Atribuciones</h1>
                        <p class="text-sm text-red-200">Entidades del Estado Plurinacional de Bolivia</p>
                    </div>
                </div>
                <!-- Search Bar -->
                <div class="w-full md:w-1/3 relative">
                    <input type="text" id="searchInput" placeholder="Buscar por sigla, nombre, ley o atribución..." 
                           class="w-full pl-10 pr-4 py-2 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-yellow-400 shadow-inner">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8 flex-grow">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-6">
            <h2 class="text-xl font-semibold text-gray-700 mb-4 md:mb-0">Listado de Entidades <span id="countBadge" class="bg-gray-200 text-gray-600 py-1 px-2 rounded-full text-sm ml-2">0</span></h2>
            
            <div class="flex flex-wrap justify-center items-center gap-4">
                <!-- Input oculto para cargar archivos -->
                <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" class="hidden">
                
                <button onclick="document.getElementById('fileInput').click()" class="flex items-center text-green-700 hover:text-green-600 font-medium transition-colors text-sm bg-green-100 hover:bg-green-200 px-3 py-2 rounded-lg" title="Importar entidades desde Excel">
                    <i class="fas fa-file-import mr-2"></i> Importar Excel
                </button>
                
                <button onclick="exportToExcel()" class="flex items-center text-blue-700 hover:text-blue-600 font-medium transition-colors text-sm bg-blue-100 hover:bg-blue-200 px-3 py-2 rounded-lg" title="Descargar base de datos">
                    <i class="fas fa-file-export mr-2"></i> Exportar Excel
                </button>

                <div class="border-l-2 border-gray-300 h-6 mx-1 hidden md:block"></div>

                <button onclick="sortEntities()" class="flex items-center text-red-800 hover:text-red-600 font-medium transition-colors text-sm bg-red-100 hover:bg-red-200 px-3 py-2 rounded-lg">
                    <i class="fas fa-sort-alpha-down mr-2" id="sortIcon"></i> Ordenar
                </button>
            </div>
        </div>

        <!-- Grid Container -->
        <div id="entitiesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Las tarjetas se insertarán aquí dinámicamente con JS -->
        </div>

        <!-- No Results Message -->
        <div id="noResults" class="hidden text-center py-12">
            <i class="fas fa-search-minus text-4xl text-gray-400 mb-4"></i>
            <h3 class="text-lg font-medium text-gray-600">No se encontraron entidades</h3>
            <p class="text-gray-500">Intenta con otros términos de búsqueda.</p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-6 mt-auto">
        <div class="container mx-auto px-4 text-center text-sm text-gray-400">
            <p><i class="fas fa-info-circle mr-1"></i> Base de datos normativa actualizada. Los datos pueden exportarse a Excel para su edición.</p>
        </div>
    </footer>

            { sigla: "OSN", nombre: "Orquesta Sinfónica Nacional", tipo: "Descentralizada", ministerio: "Ministerio de Turismo Sostenible, Culturas, Folklore y Gastronomía", creacion: "Ley N° 2206 (18/05/2001)", normativa_adicional: "D.S. N° 26233 (Estructura Organizacional de la OSN), D.S. N° 0806, D.S. N° 4857", atribuciones: "Difusión de la música sinfónica y fomento artístico-musical.", descripcion: "Máxima institución estatal encargada de la interpretación y difusión de música académica y sinfónica." },
            { sigla: "SEPMUD", nombre: "Servicio Plurinacional de la Mujer y de la Despatriarcalización “Ana María Romero”", tipo: "Descentralizada", ministerio: "Ministerio de Turismo Sostenible, Culturas, Folklore y Gastronomía", creacion: "Decreto Supremo N° 3774 (11/01/2019)", normativa_adicional: "Ley N° 348 (Ley Integral para Garantizar a las Mujeres una Vida Libre de Violencia), D.S. N° 2145 (Reglamento Ley 348), Ley N° 243, D.S. N° 4650", atribuciones: "Promoción de políticas contra la violencia, equidad y despatriarcalización.", descripcion: "Entidad dedicada a garantizar los derechos de las mujeres, monitorear la Ley 348 y desmontar el sistema patriarcal." }
        ];

        // Cargar desde localStorage (usamos _v3 para forzar la recarga con las nuevas normativas de Lexivox/Gaceta)
        let dbEntidades = JSON.parse(localStorage.getItem('entidades_bolivia_db_v3')) || defaultDbEntidades;

        let entidadesActuales = [...dbEntidades];
        let ascendente = true;

        const grid = document.getElementById('entitiesGrid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const countBadge = document.getElementById('countBadge');

        // Función para renderizar las tarjetas
        function renderEntities(entidades) {
            grid.innerHTML = '';
            countBadge.textContent = entidades.length;

            if (entidades.length === 0) {
                noResults.classList.remove('hidden');
                return;
            } else {
                noResults.classList.add('hidden');
            }

            entidades.forEach(ent => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow-md overflow-hidden card-hover border border-gray-100 flex flex-col';
                
                // Determinamos color de la etiqueta según sea descentralizada o desconcentrada
                const tipoColor = ent.tipo.toLowerCase() === 'descentralizada' ? 'bg-blue-600' : 'bg-green-600';

                card.innerHTML = `
                    <div class="bg-gradient-to-r from-red-800 to-red-700 px-4 py-3 flex justify-between items-center text-white">
                        <h3 class="font-bold text-lg" title="${ent.nombre}">${ent.sigla}</h3>
                        <span class="text-[10px] uppercase font-bold px-2 py-1 rounded shadow-inner ${tipoColor}">${ent.tipo}</span>
                    </div>
                    <div class="p-5 flex-grow flex flex-col">
                        <h4 class="text-gray-800 font-bold mb-1 leading-tight text-sm">${ent.nombre}</h4>
                        <p class="text-xs text-red-600 font-semibold mb-4"><i class="fas fa-building mr-1"></i> ${ent.ministerio}</p>
                        
                        <div class="mb-3">
                            <span class="text-[10px] uppercase font-bold text-red-600 tracking-wider">Norma de Creación</span>
                            <p class="text-xs text-gray-600 mt-1 bg-red-50 p-2 rounded border border-red-100"><i class="fas fa-file-signature text-red-400 mr-1"></i> ${ent.creacion}</p>
                        </div>

                        <div class="mb-3">
                            <span class="text-[10px] uppercase font-bold text-blue-600 tracking-wider">Otras Normas / Modificaciones</span>
                            <p class="text-xs text-gray-600 mt-1 bg-blue-50 p-2 rounded border border-blue-100"><i class="fas fa-scroll text-blue-400 mr-1"></i> ${ent.normativa_adicional || 'Sin registros adicionales'}</p>
                        </div>
                        
                        <div class="mb-4">
                            <span class="text-[10px] uppercase font-bold text-yellow-600 tracking-wider">Atribuciones</span>
                            <p class="text-xs text-gray-600 mt-1 bg-yellow-50 p-2 rounded border border-yellow-100"><i class="fas fa-gavel text-yellow-500 mr-1"></i> ${ent.atribuciones}</p>
                        </div>
                        
                        <div class="mt-auto pt-4 border-t border-gray-100">
                            <p class="text-xs text-gray-500 italic">"${ent.descripcion}"</p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Función de búsqueda
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            entidadesActuales = dbEntidades.filter(ent => 
                ent.sigla.toLowerCase().includes(query) ||
                ent.nombre.toLowerCase().includes(query) ||
                ent.ministerio.toLowerCase().includes(query) ||
                ent.tipo.toLowerCase().includes(query) ||
                ent.creacion.toLowerCase().includes(query) ||
                ent.atribuciones.toLowerCase().includes(query) ||
                ent.descripcion.toLowerCase().includes(query) ||
                (ent.normativa_adicional && ent.normativa_adicional.toLowerCase().includes(query))
            );
            renderEntities(entidadesActuales);
        });

        // Función de ordenamiento
        function sortEntities() {
            entidadesActuales.sort((a, b) => {
                if (a.sigla < b.sigla) return ascendente ? -1 : 1;
                if (a.sigla > b.sigla) return ascendente ? 1 : -1;
                return 0;
            });
            ascendente = !ascendente; // Cambiar dirección para el próximo clic
            
            // Cambiar icono de ordenamiento
            const sortIcon = document.getElementById('sortIcon');
            if (sortIcon) {
                sortIcon.className = ascendente ? 'fas fa-sort-alpha-down mr-2' : 'fas fa-sort-alpha-up mr-2';
            }
            
            renderEntities(entidadesActuales);
        }

        // Inicialización
        // Ordenamos al inicio por defecto
        sortEntities(); 

        // --- FUNCIONALIDADES DE EXCEL (IMPORTAR / EXPORTAR) ---

        // Función para exportar los datos actuales a Excel
        function exportToExcel() {
            // Convierte nuestro arreglo JSON a una hoja de Excel
            const worksheet = XLSX.utils.json_to_sheet(dbEntidades);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Entidades_Bolivia");
            
            // Lanza la descarga automática del archivo
            XLSX.writeFile(workbook, "Directorio_Entidades_Bolivia.xlsx");
        }

        // Event listener para cuando el usuario seleccione un archivo Excel
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    
                    // Seleccionar la primera hoja de trabajo
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    // Convertir de vuelta a JSON
                    const json = XLSX.utils.sheet_to_json(worksheet);
                    
                    // Validación mínima para asegurarnos que se parece a nuestra base de datos
                    if (json.length > 0 && ('sigla' in json[0]) && ('nombre' in json[0])) {
                        dbEntidades = json;
                        entidadesActuales = [...dbEntidades];
                        
                        // Guardar en el navegador (usando la nueva versión v3)
                        localStorage.setItem('entidades_bolivia_db_v3', JSON.stringify(dbEntidades));
                        
                        // Limpiar búsqueda y renderizar la nueva información
                        searchInput.value = '';
                        renderEntities(entidadesActuales);
                        
                        alert('¡Base de datos actualizada correctamente con ' + json.length + ' entidades!');
                    } else {
                        alert('Error: El formato de columnas no es válido. Te recomendamos usar el botón "Exportar Excel" primero para tener una plantilla base.');
                    }
                } catch (error) {
                    console.error("Error procesando Excel:", error);
                    alert('Hubo un error leyendo el archivo Excel. Revisa que no esté corrupto.');
                }
                
                // Reiniciamos el input por si el usuario quiere subir el mismo archivo después
                document.getElementById('fileInput').value = '';
            };
            
            reader.readAsArrayBuffer(file);
        });

    </script>
</body>
</html>
